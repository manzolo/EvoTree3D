services:
  # Development: Vite dev server with hot-module reload.
  dev:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host

  # Production: static bundle served by nginx.
  prod:
    build:
      context: .
      target: prod
      args:
        VITE_BASE: /
    ports:
      - "8080:80"
